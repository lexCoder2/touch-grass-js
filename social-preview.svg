<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0f1f0f"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a2a1a" stroke-width="1" opacity="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Green glow top band -->
  <rect x="0" y="0" width="1280" height="200" fill="url(#glowGrad)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1232" height="592" rx="12" ry="12"
        fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.35"/>

  <!-- Terminal window chrome -->
  <rect x="48" y="48" width="560" height="360" rx="8" ry="8"
        fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <!-- Window buttons -->
  <circle cx="76" cy="72" r="7" fill="#ff5f57"/>
  <circle cx="100" cy="72" r="7" fill="#febc2e"/>
  <circle cx="124" cy="72" r="7" fill="#28c840"/>
  <!-- Window title -->
  <text x="328" y="77" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">touch-grass — zsh</text>

  <!-- Terminal separator -->
  <line x1="48" y1="90" x2="608" y2="90" stroke="#30363d" stroke-width="1"/>

  <!-- ASCII art in terminal -->
  <text font-family="'Courier New', Courier, monospace" font-size="14" fill="#3fb950" filter="url(#softglow)">
    <tspan x="68" dy="0" y="118">  v        v           v        .  *</tspan>
    <tspan x="68" dy="20">   .   *       .    *      .     .</tspan>
    <tspan x="68" dy="20">        \   .   /      *</tspan>
    <tspan x="68" dy="20">     *   \ _ /     *          .  *</tspan>
    <tspan x="68" dy="20">         /| |\           .      *</tspan>
    <tspan x="68" dy="20">        / | | \    *</tspan>
    <tspan x="68" dy="20">      /   | |   \      .    *</tspan>
    <tspan x="68" dy="20">    /_____|_|_____\       .</tspan>
    <tspan x="68" dy="20">~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~</tspan>
    <tspan x="68" dy="20">/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\/\</tspan>
    <tspan x="68" dy="20"> |||||||||||||||||||||||||||||||</tspan>
  </text>

  <!-- Prompt line -->
  <text x="68" y="358" font-family="'Courier New', Courier, monospace" font-size="14">
    <tspan fill="#8b949e">$ </tspan>
    <tspan fill="#e6edf3">npx go-touch-grass</tspan>
    <tspan fill="#3fb950" filter="url(#softglow)"> ▌</tspan>
  </text>

  <!-- Divider -->
  <line x1="660" y1="80" x2="660" y2="560" stroke="#21262d" stroke-width="1.5"/>

  <!-- Right side: branding -->
  <!-- Main title -->
  <text x="690" y="150" font-family="'Courier New', Courier, monospace" font-size="52" font-weight="bold"
        fill="#3fb950" filter="url(#glow)" letter-spacing="-1">go-touch-grass</text>

  <!-- Tagline -->
  <text x="692" y="195" font-family="'Courier New', Courier, monospace" font-size="18" fill="#8b949e">
    A fun reminder to step away from your screen.
  </text>

  <!-- Feature pills -->
  <g font-family="'Courier New', Courier, monospace" font-size="15">
    <!-- pill 1 -->
    <rect x="692" y="230" width="180" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
    <text x="782" y="252" fill="#3fb950" text-anchor="middle">🌿 streak tracking</text>
    <!-- pill 2 -->
    <rect x="884" y="230" width="172" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
    <text x="970" y="252" fill="#3fb950" text-anchor="middle">🖼 ascii art scenes</text>
    <!-- pill 3 -->
    <rect x="692" y="278" width="166" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
    <text x="775" y="300" fill="#3fb950" text-anchor="middle">⏱ outdoor timer</text>
    <!-- pill 4 -->
    <rect x="870" y="278" width="186" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
    <text x="963" y="300" fill="#3fb950" text-anchor="middle">📢 social sharing</text>
    <!-- pill 5 -->
    <rect x="692" y="326" width="184" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
    <text x="784" y="348" fill="#3fb950" text-anchor="middle">🔔 VS Code extension</text>
    <!-- pill 6 -->
    <rect x="888" y="326" width="168" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1" opacity="0.8"/>
    <text x="972" y="348" fill="#3fb950" text-anchor="middle">💬 62 fun messages</text>
  </g>

  <!-- Message quote box -->
  <rect x="692" y="380" width="540" height="80" rx="8" fill="#0f1f0f" stroke="#238636" stroke-width="1"/>
  <text x="710" y="405" font-family="'Courier New', Courier, monospace" font-size="13" fill="#8b949e">&gt;&gt;&gt;</text>
  <text x="735" y="405" font-family="'Courier New', Courier, monospace" font-size="13" fill="#e6edf3">Your linter found 0 issues.</text>
  <text x="710" y="427" font-family="'Courier New', Courier, monospace" font-size="13" fill="#e6edf3">     Your therapist found several.</text>
  <text x="1200" y="450" font-family="'Courier New', Courier, monospace" font-size="11" fill="#3fb950" text-anchor="end" opacity="0.6">1 of 62</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1280" height="60" fill="#010409" opacity="0.7"/>
  <text x="48" y="617" font-family="'Courier New', Courier, monospace" font-size="15" fill="#3fb950" filter="url(#softglow)">npm install -g go-touch-grass</text>
  <line x1="380" y1="595" x2="380" y2="625" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="617" font-family="'Courier New', Courier, monospace" font-size="15" fill="#8b949e">Node.js ≥ 20  ·  GPL-3.0 License  ·  Zero config</text>
  <line x1="800" y1="595" x2="800" y2="625" stroke="#30363d" stroke-width="1"/>
  <text x="820" y="617" font-family="'Courier New', Courier, monospace" font-size="15" fill="#8b949e">github.com/lexCoder2/touch-grass-js</text>

  <!-- Stars decoration -->
  <g fill="#3fb950" opacity="0.3" font-size="10" font-family="monospace">
    <text x="1100" y="120">*</text><text x="1160" y="90">*</text>
    <text x="1200" y="140">*</text><text x="1240" y="110">*</text>
    <text x="1130" y="170">.</text><text x="1180" y="60">.</text>
  </g>
</svg>
